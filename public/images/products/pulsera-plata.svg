<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Pulsera de plata">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f3"/>
      <stop offset="1" stop-color="#e8e9ec"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="42%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6e8eb"/>
      <stop offset="0.5" stop-color="#b8bcc2"/>
      <stop offset="1" stop-color="#8a8f97"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#glow)"/>
  <g fill="none" stroke="url(#metal)" stroke-width="34" stroke-linecap="round">
    <ellipse cx="400" cy="420" rx="190" ry="150"/>
  </g>
  <g fill="url(#metal)">
    <rect x="250" y="396" width="50" height="48" rx="10"/>
    <rect x="320" y="396" width="50" height="48" rx="10"/>
    <rect x="390" y="396" width="50" height="48" rx="10"/>
    <rect x="460" y="396" width="50" height="48" rx="10"/>
  </g>
  <text x="400" y="700" text-anchor="middle" font-family="Georgia, serif" font-size="30" letter-spacing="6" fill="#6e747c">JOYERÍA DIAMANTE</text>
</svg>
