<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Cadena de oro">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f3"/>
      <stop offset="1" stop-color="#ece5d8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="42%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e3c77e"/>
      <stop offset="0.5" stop-color="#c9a24b"/>
      <stop offset="1" stop-color="#a07e2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <rect width="800" height="800" fill="url(#glow)"/>
  <g fill="none" stroke="url(#metal)" stroke-width="20">
    <ellipse cx="330" cy="300" rx="46" ry="64" transform="rotate(-30 330 300)"/>
    <ellipse cx="400" cy="380" rx="46" ry="64" transform="rotate(30 400 380)"/>
    <ellipse cx="470" cy="300" rx="46" ry="64" transform="rotate(-30 470 300)"/>
    <ellipse cx="365" cy="470" rx="46" ry="64" transform="rotate(-30 365 470)"/>
    <ellipse cx="435" cy="470" rx="46" ry="64" transform="rotate(30 435 470)"/>
  </g>
  <text x="400" y="700" text-anchor="middle" font-family="Georgia, serif" font-size="30" letter-spacing="6" fill="#a07e2e">JOYERÍA DIAMANTE</text>
</svg>
